<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Master Baker — Panel Fundadores</title>
<link rel="manifest" href="/panel-fundadores/manifest.json">
<meta name="theme-color" content="#0B1220">
<link rel="apple-touch-icon" href="/branding/logo-emblema.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fundadores">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
margin: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
background: radial-gradient(circle at 15% 0%, #182338 0%, #0B1220 45%), #0B1220;
background-attachment: fixed;
color: #EDEFF4;
padding: 24px;
padding-bottom: 60px;
min-height: 100vh;
}
.wrap { max-width: 1100px; margin: 0 auto; }
h1 {
font-size: 22px;
font-weight: 700;
margin: 0 0 4px;
background: linear-gradient(90deg, #F3D9A4, #C29C53);
-webkit-background-clip: text;
background-clip: text;
color: transparent;
}
.subtitle {
font-size: 13px;
color: #8B92A6;
margin: 0 0 24px;
}
.token-form {
display: flex;
gap: 10px;
align-items: center;
padding: 18px;
background: linear-gradient(145deg, #182338, #131C2C);
border-radius: 14px;
margin-bottom: 24px;
border: 1px solid #263049;
}
.token-form input {
flex: 1;
height: 42px;
padding: 0 14px;
border: 1px solid #2E3A56;
border-radius: 8px;
font-size: 16px;
background: #0F1626;
color: #EDEFF4;
}
.token-form input::placeholder { color: #5C6579; }
.token-form button, .toolbar button {
height: 42px;
padding: 0 18px;
border: none;
border-radius: 8px;
background: linear-gradient(135deg, #E9C077, #C29C53);
color: #2A1D06;
font-size: 14px;
font-weight: 700;
cursor: pointer;
}
.toolbar button {
background: #182338;
color: #C7CCDA;
border: 1px solid #2E3A56;
font-weight: 600;
}
.toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
.toolbar .right { display: flex; gap: 8px; align-items: center; }
.updated { font-size: 12px; color: #6B7387; }
.small-link { font-size: 12px; color: #8B92A6; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }

.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat {
position: relative;
overflow: hidden;
border-radius: 14px;
padding: 16px 18px;
background: linear-gradient(145deg, #182338, #131C2C);
border: 1px solid #263049;
}
.stat::before {
content: '';
position: absolute; inset: 0;
opacity: .12;
background: var(--accent-grad);
}
.stat-icon {
width: 34px; height: 34px; border-radius: 9px;
display: flex; align-items: center; justify-content: center;
font-size: 16px; margin-bottom: 10px;
background: var(--accent-grad);
position: relative;
}
.stat-label { font-size: 11px; color: #8B92A6; margin: 0 0 4px; position: relative; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
.stat-value { font-size: 26px; font-weight: 700; margin: 0; color: #F5F6FA; position: relative; }
.s-teal   { --accent-grad: linear-gradient(135deg, #34D9B5, #12876E); }
.s-gold   { --accent-grad: linear-gradient(135deg, #E9C077, #C29C53); }
.s-blue   { --accent-grad: linear-gradient(135deg, #6FA8FF, #3A6FD8); }
.s-coral  { --accent-grad: linear-gradient(135deg, #FF9E80, #E2593A); }

.dash-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 760px) { .dash-grid { grid-template-columns: 1fr; } }
.panel-card {
background: linear-gradient(145deg, #182338, #131C2C);
border: 1px solid #263049;
border-radius: 14px;
padding: 18px 20px;
}
.panel-card h2 { font-size: 13px; font-weight: 700; margin: 0 0 14px; color: #C7CCDA; text-transform: uppercase; letter-spacing: .04em; }
.chart-box { position: relative; height: 220px; }

.table-scroll { overflow-x: auto; border-radius: 14px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; background: linear-gradient(145deg, #182338, #131C2C); border-radius: 14px; overflow: hidden; border: 1px solid #263049; }
th { text-align: left; font-weight: 700; color: #8B92A6; padding: 12px 14px; border-bottom: 1px solid #263049; white-space: nowrap; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
td { padding: 14px; border-bottom: 1px solid #1C2638; vertical-align: middle; white-space: nowrap; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(194,156,83,0.05); }
.negocio-cell { display: flex; align-items: center; gap: 10px; }
.avatar {
width: 34px; height: 34px; border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 13px; font-weight: 700; color: #2A1D06;
background: linear-gradient(135deg, #E9C077, #C29C53);
flex-shrink: 0;
}
.negocio { font-weight: 700; color: #F5F6FA; }
.muted { color: #6B7387; }
.badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
.badge-activo { background: rgba(52,217,181,0.15); color: #34D9B5; }
.badge-inactivo { background: rgba(139,146,166,0.15); color: #8B92A6; }
.num { text-align: right; font-variant-numeric: tabular-nums; color: #EDEFF4; }
.submetric { font-size: 11px; color: #6B7387; }
.empty, .error, .loading { padding: 50px 20px; text-align: center; color: #6B7387; font-size: 14px; background: linear-gradient(145deg, #182338, #131C2C); border-radius: 14px; border: 1px solid #263049; }
.error { color: #FF9E80; }
.reset-btn {
height: 30px;
padding: 0 12px;
border: 1px solid #2E3A56;
border-radius: 8px;
background: #0F1626;
color: #C7CCDA;
font-size: 12px;
font-weight: 600;
cursor: pointer;
white-space: nowrap;
}
.reset-btn:hover { border-color: #C29C53; color: #E9C077; }
.reset-btn:disabled { color: #454C5E; cursor: default; }
.modal-overlay {
position: fixed; inset: 0; background: rgba(6,9,16,0.65);
display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10;
}
.modal {
background: linear-gradient(145deg, #182338, #131C2C); border: 1px solid #263049;
border-radius: 14px; padding: 22px; max-width: 360px; width: 100%;
}
.modal h2 { font-size: 16px; margin: 0 0 4px; color: #F5F6FA; text-transform: none; letter-spacing: 0; }
.modal p { font-size: 13px; color: #8B92A6; margin: 0 0 14px; }
.modal .cred-box {
background: #0F1626; border: 1px solid #263049; border-radius: 10px; padding: 14px; margin-bottom: 14px; font-size: 13px;
}
.modal .cred-box div { margin-bottom: 8px; color: #C7CCDA; }
.modal .cred-box div:last-child { margin-bottom: 0; }
.modal .cred-box code { background: #182338; border: 1px solid #2E3A56; border-radius: 4px; padding: 3px 7px; font-size: 13px; color: #E9C077; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal .warn { color: #FF9E80; font-size: 12px; margin-top: 12px; }
</style>
</head>
<body>
<div class="wrap">

<h1>Estado de socios fundadores</h1>
<p class="subtitle">Registro, actividad y avance de cada panadería sobre Master Baker.</p>

<div id="tokenForm" class="token-form" style="display:none">
<input type="password" id="tokenInput" placeholder="Pegá tu ADMIN_TOKEN" autocomplete="off" />
<button id="tokenSave">Guardar</button>
</div>

<div id="toolbar" class="toolbar" style="display:none">
<span class="updated" id="updatedAt"></span>
<div class="right">
<button class="small-link" id="changeToken">Cambiar token</button>
<button id="refreshBtn">Actualizar</button>
</div>
</div>

<div id="summary"></div>
<div id="dashboard"></div>
<div id="content"></div>
<div id="modalRoot"></div>

</div>

<script>
const API_URL = 'https://master-baker-production.up.railway.app/api/admin/estado-fundadores';
const STORAGE_KEY = 'mb_admin_token';

const tokenForm = document.getElementById('tokenForm');
const tokenInput = document.getElementById('tokenInput');
const tokenSave = document.getElementById('tokenSave');
const toolbar = document.getElementById('toolbar');
const summary = document.getElementById('summary');
const dashboard = document.getElementById('dashboard');
const content = document.getElementById('content');
const updatedAt = document.getElementById('updatedAt');
const refreshBtn = document.getElementById('refreshBtn');
const changeToken = document.getElementById('changeToken');

let chartInstance = null;
let doughnutInstance = null;

function getToken() { return localStorage.getItem(STORAGE_KEY) || ''; }

function showTokenForm() {
tokenForm.style.display = 'flex';
toolbar.style.display = 'none';
summary.innerHTML = '';
dashboard.innerHTML = '';
tokenInput.value = getToken();
}

function timeAgo(iso) {
if (!iso) return null;
const d = new Date(iso);
const mins = Math.floor((Date.now() - d.getTime()) / 60000);
if (mins < 1) return 'recién';
if (mins < 60) return `hace ${mins} min`;
const hours = Math.floor(mins / 60);
if (hours < 24) return `hace ${hours} h`;
const days = Math.floor(hours / 24);
if (days < 30) return `hace ${days} d`;
const months = Math.floor(days / 30);
return `hace ${months} mes${months > 1 ? 'es' : ''}`;
}

function formatTokens(n) {
n = n || 0;
if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
return String(n);
}

function formatMinutos(mins) {
mins = mins || 0;
if (mins < 1) return '0 min';
if (mins < 60) return `${mins} min`;
const horas = Math.floor(mins / 60);
const resto = mins % 60;
if (horas < 24) return resto ? `${horas}h ${resto}m` : `${horas}h`;
const dias = Math.floor(horas / 24);
const horasResto = horas % 24;
return horasResto ? `${dias}d ${horasResto}h` : `${dias}d`;
}

function escapeHtml(s) {
const div = document.createElement('div');
div.textContent = s;
return div.innerHTML;
}

function iniciales(nombre) {
if (!nombre) return '?';
const partes = nombre.trim().split(/\s+/);
if (partes.length === 1) return partes[0].slice(0, 2).toUpperCase();
return (partes[0][0] + partes[partes.length - 1][0]).toUpperCase();
}

function renderDashboard(rows) {
if (!rows || rows.length === 0) { dashboard.innerHTML = ''; return; }

dashboard.innerHTML = `
<div class="dash-grid">
<div class="panel-card">
<h2>Ventas y productos por negocio</h2>
<div class="chart-box"><canvas id="barChart"></canvas></div>
</div>
<div class="panel-card">
<h2>Estado de la base</h2>
<div class="chart-box"><canvas id="doughnutChart"></canvas></div>
</div>
</div>`;

const sorted = [...rows].sort((a, b) => new Date(a.creado_en) - new Date(b.creado_en));
const labels = sorted.map(r => r.negocio || r.slug);
const ventas = sorted.map(r => r.ventas || 0);
const productos = sorted.map(r => r.productos_reales || 0);

if (chartInstance) chartInstance.destroy();
const ctx = document.getElementById('barChart').getContext('2d');
chartInstance = new Chart(ctx, {
type: 'bar',
data: {
labels,
datasets: [
{ label: 'Ventas', data: ventas, backgroundColor: '#34D9B5', borderRadius: 6, maxBarThickness: 34 },
{ label: 'Productos', data: productos, backgroundColor: '#E9C077', borderRadius: 6, maxBarThickness: 34 }
]
},
options: {
responsive: true, maintainAspectRatio: false,
plugins: { legend: { labels: { color: '#C7CCDA', font: { size: 11 } } } },
scales: {
x: { ticks: { color: '#8B92A6', font: { size: 11 } }, grid: { display: false } },
y: { ticks: { color: '#8B92A6', font: { size: 11 } }, grid: { color: '#1C2638' }, beginAtZero: true }
}
}
});

const activos = rows.filter(r => r.admin_email && r.ultimo_login && (Date.now() - new Date(r.ultimo_login).getTime()) < 7 * 24 * 3600 * 1000).length;
const inactivos = rows.length - activos;

if (doughnutInstance) doughnutInstance.destroy();
const ctx2 = document.getElementById('doughnutChart').getContext('2d');
doughnutInstance = new Chart(ctx2, {
type: 'doughnut',
data: {
labels: ['Activos', 'Inactivos'],
datasets: [{ data: [activos, inactivos], backgroundColor: ['#34D9B5', '#3A4560'], borderWidth: 0 }]
},
options: {
responsive: true, maintainAspectRatio: false,
cutout: '68%',
plugins: { legend: { position: 'bottom', labels: { color: '#C7CCDA', font: { size: 11 }, padding: 12 } } }
}
});
}

function render(rows) {
const registrados = rows.length;
const activos = rows.filter(r => r.admin_email && r.ultimo_login && (Date.now() - new Date(r.ultimo_login).getTime()) < 7 * 24 * 3600 * 1000).length;
const totalVentas = rows.reduce((acc, r) => acc + (r.ventas || 0), 0);
const totalTokens = rows.reduce((acc, r) => acc + (r.tokens_total || 0), 0);

summary.innerHTML = `
<div class="summary">
<div class="stat s-gold"><div class="stat-icon">🏪</div><p class="stat-label">Negocios registrados</p><p class="stat-value">${registrados}</p></div>
<div class="stat s-teal"><div class="stat-icon">✓</div><p class="stat-label">Activos (7 días)</p><p class="stat-value">${activos}</p></div>
<div class="stat s-blue"><div class="stat-icon">📈</div><p class="stat-label">Ventas registradas</p><p class="stat-value">${totalVentas}</p></div>
<div class="stat s-coral"><div class="stat-icon">⚡</div><p class="stat-label">Tokens IA (total)</p><p class="stat-value">${formatTokens(totalTokens)}</p></div>
</div>`;

renderDashboard(rows);

if (!rows || rows.length === 0) {
content.innerHTML = '<div class="empty">Todavía no hay negocios registrados.</div>';
return;
}

const sorted = [...rows].sort((a, b) => new Date(b.creado_en) - new Date(a.creado_en));
const body = sorted.map(r => {
const activo = r.admin_email && r.ultimo_login && (Date.now() - new Date(r.ultimo_login).getTime()) < 7 * 24 * 3600 * 1000;
const badge = r.admin_email
? `<span class="badge ${activo ? 'badge-activo' : 'badge-inactivo'}">${activo ? 'Activo' : 'Inactivo'}</span>`
: '<span class="badge badge-inactivo">Sin admin</span>';
const resetBtn = r.admin_email
? `<button class="reset-btn" data-slug="${escapeHtml(r.slug)}" data-negocio="${escapeHtml(r.negocio || r.slug)}">Resetear contraseña</button>`
: `<button class="reset-btn" disabled>—</button>`;
return `
<tr>
<td>
<div class="negocio-cell">
<div class="avatar">${iniciales(r.negocio || r.slug)}</div>
<div>
<div class="negocio">${escapeHtml(r.negocio || r.slug)}</div>
<div class="muted">${escapeHtml(r.admin_email || 'sin registrar')}</div>
</div>
</div>
</td>
<td>${badge}</td>
<td>${r.ultimo_login ? timeAgo(r.ultimo_login) : '<span class="muted">nunca</span>'}</td>
<td class="num">${r.productos_reales}</td>
<td class="num">${r.ventas}</td>
<td class="num">${r.items_inventario}</td>
<td class="num">
${formatTokens(r.tokens_total)}
<div class="submetric">${formatTokens(r.tokens_7d)} / 7d</div>
</td>
<td class="num">
${formatMinutos(r.tiempo_pantalla_min_total)}
<div class="submetric">${formatMinutos(r.tiempo_pantalla_min_7d)} / 7d</div>
</td>
<td class="muted">${timeAgo(r.creado_en)}</td>
<td>${resetBtn}</td>
</tr>`;
}).join('');

content.innerHTML = `
<div class="table-scroll">
<table>
<thead>
<tr>
<th>Negocio</th><th>Estado</th><th>Último login</th>
<th class="num">Productos</th><th class="num">Ventas</th><th class="num">Inventario</th>
<th class="num">Tokens IA</th><th class="num">Tiempo pantalla</th>
<th>Registrado</th><th></th>
</tr>
</thead>
<tbody>${body}</tbody>
</table>
</div>`;

content.querySelectorAll('.reset-btn[data-slug]').forEach((btn) => {
btn.addEventListener('click', () => resetPassword(btn.dataset.slug, btn.dataset.negocio));
});
}

async function resetPassword(slug, negocio) {
if (!confirm(`¿Generar una contraseña nueva para "${negocio}"? La contraseña actual dejará de funcionar.`)) return;

const token = getToken();
try {
const res = await fetch(API_URL.replace('/estado-fundadores', '/reset-password'), {
method: 'POST',
headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
body: JSON.stringify({ slug })
});
const data = await res.json();
if (!res.ok) {
alert('Error: ' + (data.error || res.status));
return;
}
showPasswordModal(data);
} catch (e) {
alert('No se pudo conectar con el servidor.');
}
}

function showPasswordModal({ negocio, email, nueva_password }) {
const modalRoot = document.getElementById('modalRoot');
modalRoot.innerHTML = `
<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<h2>Contraseña restablecida</h2>
<p>${escapeHtml(negocio)}</p>
<div class="cred-box">
<div>Usuario: <code>${escapeHtml(email)}</code></div>
<div>Contraseña nueva: <code id="newPass">${escapeHtml(nueva_password)}</code></div>
</div>
<div class="actions">
<button class="reset-btn" id="copyBtn">Copiar</button>
<button class="reset-btn" id="closeModal">Cerrar</button>
</div>
<p class="warn">Compartila con el socio ahora — no se vuelve a mostrar acá.</p>
</div>
</div>`;

document.getElementById('closeModal').addEventListener('click', () => { modalRoot.innerHTML = ''; });
document.getElementById('modalOverlay').addEventListener('click', (e) => {
if (e.target.id === 'modalOverlay') modalRoot.innerHTML = '';
});
document.getElementById('copyBtn').addEventListener('click', () => {
navigator.clipboard.writeText(`Usuario: ${email}\nContraseña: ${nueva_password}`).then(() => {
document.getElementById('copyBtn').textContent = 'Copiado';
});
});
}

async function load() {
const token = getToken();
if (!token) { showTokenForm(); return; }

tokenForm.style.display = 'none';
toolbar.style.display = 'flex';
content.innerHTML = '<div class="loading">Cargando…</div>';

try {
const res = await fetch(API_URL, { headers: { 'x-admin-token': token } });
if (res.status === 401) {
localStorage.removeItem(STORAGE_KEY);
showTokenForm();
content.innerHTML = '';
return;
}
if (res.status === 503) {
content.innerHTML = '<div class="error">El servidor todavía no tiene ADMIN_TOKEN configurado.</div>';
return;
}
if (!res.ok) { content.innerHTML = `<div class="error">Error del servidor (${res.status}).</div>`; return; }
const data = await res.json();
render(data);
updatedAt.textContent = 'Actualizado ' + new Date().toLocaleString('es', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' });
} catch (e) {
content.innerHTML = '<div class="error">No se pudo conectar. Revisá tu conexión y probá de nuevo.</div>';
}
}

tokenSave.addEventListener('click', () => {
const v = tokenInput.value.trim();
if (!v) return;
localStorage.setItem(STORAGE_KEY, v);
load();
});
tokenInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tokenSave.click(); });
refreshBtn.addEventListener('click', load);
changeToken.addEventListener('click', showTokenForm);

if ('serviceWorker' in navigator) {
window.addEventListener('load', () => {
navigator.serviceWorker.register('/panel-fundadores/sw.js', { scope: '/panel-fundadores/' }).catch(() => {});
});
}

load();
</script>

</body>
</html>
